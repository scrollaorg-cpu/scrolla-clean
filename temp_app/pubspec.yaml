name: scrolla
description: Faith x Productivity x Fellowship
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI / state
  provider: ^6.1.2
  go_router: ^14.2.7
  google_fonts: ^6.2.1

  # Firebase
  firebase_core: ^3.4.0
  firebase_auth: ^5.2.0
  cloud_firestore: ^5.4.0
  firebase_storage: ^12.2.0
  google_sign_in: ^6.2.1


  # Local storage
  shared_preferences: ^2.3.2

  # Networking
  dio: ^5.7.0

  # Notifications (local)
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

  # Helpers
  intl: ^0.19.0
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
    android: true
    ios: true
    image_path: "assets/images/scrolla_logo.png"

flutter_native_splash:
    color: "#ffffff"
    image: assets/images/scrolla_logo.png
    android: true
    ios: true